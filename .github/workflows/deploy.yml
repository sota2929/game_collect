name: Deploy website to FTP server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTP with retry
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${FTP_SERVER:-}" ] || [ -z "${FTP_USERNAME:-}" ] || [ -z "${FTP_PASSWORD:-}" ] || [ -z "${FTP_SERVER_DIR:-}" ]; then
            echo "FTP deploy secrets are missing."
            exit 1
          fi

          for attempt in 1 2 3; do
            echo "FTP deploy attempt ${attempt}/3"
            if lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set cmd:fail-exit yes
          set net:max-retries 5
          set net:reconnect-interval-base 8
          set net:reconnect-interval-multiplier 2
          set net:timeout 30
          set ftp:ssl-allow false
          set ftp:passive-mode true
          set ftp:sync-mode false
          mirror --reverse --delete --verbose --parallel=1 \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude-glob .DS_Store \
            --exclude-glob README.md \
            ./ "$FTP_SERVER_DIR"
          bye
          EOF
            then
              exit 0
            fi
            sleep $((attempt * 20))
          done

          echo "FTP deploy failed after 3 attempts."
          exit 1
