<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お問い合わせ | Collect Arcade</title>
    <meta name="description" content="Collect Arcadeへのお問い合わせページです。ゲームの不具合報告、改善要望、掲載内容に関する連絡をフォームから送信できます。" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://game-collect.online/contact.html" />
    <meta property="og:site_name" content="Collect Arcade" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:title" content="お問い合わせ | Collect Arcade" />
    <meta property="og:description" content="ゲームの不具合報告や改善要望をフォームから送信できます。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game-collect.online/contact.html" />
    <meta name="twitter:card" content="summary" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "お問い合わせ | Collect Arcade",
        "url": "https://game-collect.online/contact.html",
        "inLanguage": "ja",
        "description": "ゲームの不具合報告、改善要望、掲載内容に関する連絡をフォームから送信できます。"
      }
    </script>
    <link rel="stylesheet" href="style.css?v=20260509-5" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">Collect Arcade</a>
      <nav class="site-nav" aria-label="Site navigation">
        <a href="index.html">ゲーム一覧</a>
        <a href="privacy.html">プライバシー</a>
        <a href="terms.html">利用規約</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
    </header>
    <main class="shell">
      <section class="content-card">
        <p class="eyebrow">Contact</p>
        <h1>お問い合わせ</h1>
        <p>ゲームの不具合、改善要望、掲載内容について送信できます。運営者のメールアドレスはページ上には公開していません。</p>

        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xzdozwer" method="POST">
          <input type="text" name="_gotcha" class="honeypot" tabindex="-1" autocomplete="off" aria-hidden="true" />
          <input type="hidden" name="_subject" value="Collect Arcade お問い合わせ" />

          <label>
            お名前
            <input type="text" name="name" autocomplete="name" required maxlength="80" />
          </label>

          <label>
            返信先メールアドレス
            <input type="email" name="email" autocomplete="email" required maxlength="120" />
          </label>

          <label>
            種別
            <select name="category" required>
              <option value="">選択してください</option>
              <option value="bug">不具合報告</option>
              <option value="idea">改善要望</option>
              <option value="question">質問</option>
              <option value="other">その他</option>
            </select>
          </label>

          <label>
            対象ゲーム
            <select name="game">
              <option value="site">サイト全体</option>
              <option value="クリスタル防衛線">クリスタル防衛線</option>
              <option value="オーロラ航路">オーロラ航路</option>
              <option value="紋章の庭">紋章の庭</option>
              <option value="ネオン配達便">ネオン配達便</option>
              <option value="潮汐の鍛冶場">潮汐の鍛冶場</option>
            </select>
          </label>

          <label class="full">
            お問い合わせ内容
            <textarea name="message" rows="8" required maxlength="2000" placeholder="発生した問題、利用端末、ブラウザ、改善案などを書いてください。"></textarea>
          </label>

          <label class="consent full">
            <input type="checkbox" name="privacy_confirmed" required />
            <span>入力内容をお問い合わせ対応のために送信することに同意します。</span>
          </label>

          <div class="form-actions full">
            <button type="submit">送信する</button>
            <p id="formStatus" role="status" aria-live="polite"></p>
          </div>
        </form>

        <section class="setup-note" aria-label="Form setup note">
          <h2>送信について</h2>
          <p>送信内容はFormspreeを通じて運営者へ通知されます。運営者のメールアドレスはこのページには表示していません。</p>
        </section>
      </section>
    </main>
    <script src="contact.js"></script>
  </body>
</html>
