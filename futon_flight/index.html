<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ふとんがふっとんだ！ | 無料ブラウザ物理アクションゲーム</title>
    <meta name="description" content="ふとんがふっとんだ！は、屋上から布団を飛ばして着地距離を競う無料ブラウザ物理アクションゲームです。長押しとタップだけでスマホ・PCから遊べます。" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://game-collect.online/futon_flight/" />
    <link rel="stylesheet" href="style.css?v=20260605-1" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <a href="/">ゲーム一覧へ</a>
        <button id="soundToggle" type="button" aria-pressed="true">Sound ON</button>
      </header>

      <section class="poster">
        <div class="poster-copy">
          <p class="kicker">One throw physics action</p>
          <h1>ふとんが<br />ふっとんだ！</h1>
          <p>風を読んで、屋上から布団を遠くへ。着地の瞬間まで、勝負は終わらない。</p>
        </div>
        <div class="poster-mark" aria-hidden="true">
          <span class="sun"></span>
          <span class="futon-icon"></span>
          <span class="wind-line line-one"></span>
          <span class="wind-line line-two"></span>
        </div>
      </section>

      <section class="game-panel">
        <div class="hud">
          <div><span>Throw</span><strong id="throwCount">1 / 5</strong></div>
          <div><span>Distance</span><strong id="distance">0.0 m</strong></div>
          <div><span>Total</span><strong id="total">0.0 m</strong></div>
          <div class="wind-meter"><span>Wind</span><strong id="wind">→ 2.4</strong></div>
        </div>

        <div class="stage-wrap">
          <canvas id="gameCanvas" width="1100" height="620" aria-label="布団を飛ばすゲーム画面"></canvas>
          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <p class="kicker">5 throws challenge</p>
              <h2 id="overlayTitle">遠くのベランダを狙え</h2>
              <div class="control-demo" aria-hidden="true">
                <span class="hold-demo"></span>
                <span class="arrow-demo">→</span>
                <span class="flap-demo"></span>
              </div>
              <p id="overlayText">長押しで力をため、離すと発射。空中で最大2回タップすると、布団がふわっと浮きます。</p>
              <button id="startButton" type="button">Start</button>
              <small>マウス / タッチ / Space / Enter</small>
            </div>
          </div>
          <div id="message" class="message" aria-live="polite"></div>
        </div>

        <div class="power-panel">
          <div class="power-label"><span>長押しでパワー</span><strong id="powerValue">0%</strong></div>
          <div class="power-track"><span id="powerFill"></span><i class="sweet-zone"></i></div>
          <div class="action-state">
            <strong id="stateLabel">READY</strong>
            <span id="flapCount">頂点タップで大加速 ×2</span>
          </div>
        </div>
      </section>
    </main>
    <script src="game.js?v=20260605-5"></script>
  </body>
</html>
