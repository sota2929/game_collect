  <body>
    <main class="station-shell">
      <header class="topbar">
        <a class="back-link" href="/">ゲーム一覧へ戻る</a>
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">終</span>
          <div>
            <p>数字タップ脳トレ</p>
            <h1>終電ナンバーサーチ</h1>
          </div>
        </div>
        <button id="soundToggle" class="tool-button" type="button" aria-pressed="true">Sound On</button>
      </header>

      <section class="game-panel" aria-label="ゲーム画面">
        <div class="station-sign">
          <span>Last Train</span>
          <strong id="targetText">1</strong>
          <span>を探す</span>
        </div>

        <div class="hud" aria-label="ゲーム状況">
          <div><span>Score</span><strong id="scoreText">0</strong></div>
          <div><span>Time</span><strong id="timeText">45</strong></div>
          <div><span>Combo</span><strong id="comboText">0</strong></div>
          <div><span>Stage</span><strong id="stageText">1</strong></div>
        </div>

        <div class="board-card">
          <div class="platform-line">
            <span id="phaseText">Ready</span>
            <strong id="goalText">1 → 12</strong>
          </div>
          <div id="board" class="board" aria-label="終電ナンバーサーチの数字盤面"></div>
        </div>

        <div class="command-row">
          <button id="startButton" type="button">Start</button>
          <button id="shuffleButton" type="button">Shuffle</button>
        </div>
        <p id="message" class="message">発車標に散らばった数字を、1から順番に押していきましょう。</p>
      </section>

      <section class="guide">
        <article>
          <h2>遊び方</h2>
          <p>盤面から次の数字を探してタップします。1、2、3……と最後まで押せたら次のステージへ進みます。</p>
        </article>
        <article>
          <h2>攻略のコツ</h2>
          <p>次の数字だけでなく、その次の数字の場所も見ておくとコンボが続きます。迷ったら視線を左上から横に流すと見つけやすいです。</p>
        </article>
      </section>
    </main>

    <section id="resultModal" class="modal" hidden>
      <div class="result-card">
        <p>Last Train Departed</p>
        <h2 id="resultTitle">Result</h2>
        <dl>
          <div><dt>Score</dt><dd id="resultScore">0</dd></div>
          <div><dt>Stage</dt><dd id="resultStage">1</dd></div>
        </dl>
        <button id="retryButton" type="button">もう一度</button>
        <a href="/games/last-train-number-hunt/">詳細を見る</a>
      </div>
    </section>

    <script src="../ugc.js?v=20260514-1" data-current-game="last-train-number-hunt"></script>
