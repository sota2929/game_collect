  <body>
    <main class="route-shell">
      <header class="topbar">
        <a class="back-link" href="/">ゲーム一覧へ戻る</a>
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">月</span>
          <div>
            <p>記憶力ルートパズル</p>
            <h1>月影メモリールート</h1>
          </div>
        </div>
        <button id="soundToggle" class="tool-button" type="button" aria-pressed="true">Sound On</button>
      </header>

      <section class="game-panel" aria-label="ゲーム画面">
        <div class="hud" aria-label="ゲーム状況">
          <div><span>Score</span><strong id="scoreText">0</strong></div>
          <div><span>Time</span><strong id="timeText">60</strong></div>
          <div><span>Stage</span><strong id="stageText">1</strong></div>
          <div><span>Focus</span><strong id="lifeText">3</strong></div>
        </div>

        <div class="board-card">
          <div class="phase-line">
            <span id="phaseText">Ready</span>
            <strong id="pathText">0 steps</strong>
          </div>
          <div id="board" class="board" aria-label="月影メモリールートの盤面"></div>
        </div>

        <div class="command-row">
          <button id="startButton" type="button">Start</button>
          <button id="previewButton" type="button">Preview</button>
          <button id="newRouteButton" type="button">New Route</button>
        </div>
        <p id="message" class="message">月明かりで光った道を覚えて、同じ順番でなぞりましょう。</p>
      </section>

      <section class="guide">
        <article>
          <h2>遊び方</h2>
          <p>最初に月の光が道順を照らします。光が消えたら、押したまま同じ順番でマスをなぞってください。</p>
        </article>
        <article>
          <h2>攻略のコツ</h2>
          <p>道を「上、右、右、下」のように方向で覚えると安定します。指やマウスを離さず、青い光で一気になぞるのがコツです。</p>
        </article>
      </section>
    </main>

    <section id="resultModal" class="modal" hidden>
      <div class="result-card">
        <p>Memory Route Complete</p>
        <h2 id="resultTitle">Result</h2>
        <dl>
          <div><dt>Score</dt><dd id="resultScore">0</dd></div>
          <div><dt>Stage</dt><dd id="resultStage">1</dd></div>
        </dl>
        <button id="retryButton" type="button">もう一度</button>
        <a href="/games/moonlit-memory-route/">詳細を見る</a>
      </div>
    </section>
