  <body>
    <main class="lab-shell">
      <header class="topbar">
        <a class="back-link" href="../index.html">ゲーム一覧へ戻る</a>
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">±</span>
          <div>
            <p>数字仕分けタイムアタック</p>
            <h1>奇偶ソートラボ</h1>
          </div>
        </div>
        <button id="soundToggle" class="tool-button" type="button" aria-pressed="true">Sound On</button>
      </header>

      <section class="hud" aria-label="ゲーム状況">
        <div><span>Stage</span><strong id="stageText">1 / 8</strong></div>
        <div><span>Time</span><strong id="timeText">00.00</strong></div>
        <div><span>Combo</span><strong id="comboText">0</strong></div>
        <div><span>Best</span><strong id="bestText">--.--</strong></div>
      </section>

      <section class="lab-card">
        <div class="mission">
          <div>
            <span>Rule</span>
            <strong id="ruleText">少ない方を先に、昇順</strong>
          </div>
          <div>
            <span>Next</span>
            <strong id="nextText">Start</strong>
          </div>
          <div>
            <span>Miss</span>
            <strong id="missText">0</strong>
          </div>
        </div>

        <div id="numberRow" class="number-row" aria-label="問題の数字カード"></div>
        <div id="answerRow" class="answer-row" aria-label="選んだ数字の並び"></div>
        <p id="message" class="message">Startを押すと、奇数と偶数の仕分け実験が始まります。</p>
      </section>

      <section class="controls" aria-label="操作">
        <button id="startButton" type="button">Start</button>
        <button id="undoButton" type="button">Undo</button>
        <button id="hintButton" type="button">Hint</button>
      </section>

      <section class="guide">
        <article>
          <h2>遊び方</h2>
          <p>表示された数字カードを、ルール通りの順番でクリックします。正しいカードを最後まで選べば次のステージへ進みます。</p>
        </article>
        <article>
          <h2>ルール</h2>
          <p>奇数と偶数を比べ、少ない方を先に昇順で選びます。同数なら奇数が先。全部奇数なら昇順、全部偶数なら降順です。</p>
        </article>
      </section>
    </main>

    <section id="resultModal" class="modal" hidden>
      <div class="result-card">
        <p>Result</p>
        <h2 id="resultTitle">Clear</h2>
        <dl>
          <div><dt>Time</dt><dd id="resultTime">0.00</dd></div>
          <div><dt>Miss</dt><dd id="resultMiss">0</dd></div>
        </dl>
        <button id="retryButton" type="button">もう一度</button>
        <a href="../games/parity-sort-lab/index.html">詳細を見る</a>
      </div>
    </section>

    <script src="../ugc.js?v=20260514-1" data-current-game="parity-sort-lab"></script>
    <script src="game.js?v=20260515-1"></script>
  </body>
