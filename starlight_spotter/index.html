  <body>
    <main class="spotter-shell">
      <header class="topbar">
        <a class="back-link" href="/">ゲーム一覧へ戻る</a>
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">星</span>
          <div>
            <p>観察力まちがい探し</p>
            <h1>星灯りまちがい探し</h1>
          </div>
        </div>
        <button id="soundToggle" class="tool-button" type="button" aria-pressed="true">Sound On</button>
      </header>

      <section class="game-panel" aria-label="ゲーム画面">
        <div class="hud" aria-label="ゲーム状況">
          <div><span>Score</span><strong id="scoreText">0</strong></div>
          <div><span>Time</span><strong id="timeText">30</strong></div>
          <div><span>Found</span><strong id="foundText">0 / 5</strong></div>
          <div><span>Stage</span><strong id="stageText">1</strong></div>
        </div>

        <div class="canvas-wrap">
          <article class="scene-card">
            <div class="scene-head"><span>Left</span><strong>原画</strong></div>
            <canvas id="leftCanvas" width="560" height="360" aria-label="左の星空シーン"></canvas>
          </article>
          <article class="scene-card">
            <div class="scene-head"><span>Right</span><strong>違いあり</strong></div>
            <canvas id="rightCanvas" width="560" height="360" aria-label="右の星空シーン"></canvas>
          </article>
        </div>

        <div class="command-row">
          <button id="startButton" type="button">Start</button>
          <button id="hintButton" type="button">Hint 3</button>
          <button id="shuffleButton" type="button">New Scene</button>
        </div>
        <p id="message" class="message">左右の絵を見比べて、違うところをクリック/タップしましょう。</p>
      </section>

      <section class="guide">
        <article>
          <h2>遊び方</h2>
          <p>左右の星空シーンにある5つの違いを探します。違いを見つけたら、どちらの絵でもその場所をクリック/タップできます。</p>
        </article>
        <article>
          <h2>攻略のコツ</h2>
          <p>明るい星、窓、ランタン、植物の形を順番に見ると見落としが減ります。Hintはどうしても詰まった時だけ使いましょう。</p>
        </article>
      </section>
    </main>

    <section id="resultModal" class="modal" hidden>
      <div class="result-card">
        <p>Observation Complete</p>
        <h2 id="resultTitle">Result</h2>
        <dl>
          <div><dt>Score</dt><dd id="resultScore">0</dd></div>
          <div><dt>Stage</dt><dd id="resultStage">1</dd></div>
        </dl>
        <button id="retryButton" type="button">もう一度</button>
        <a href="/games/starlight-spotter/">詳細を見る</a>
      </div>
    </section>

    <script src="../ugc.js?v=20260514-1" data-current-game="starlight-spotter"></script>
    <script src="game.js?v=20260521-1"></script>
  </body>
